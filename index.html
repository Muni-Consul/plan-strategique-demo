<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Démo — Plan stratégique | Muni-Consul</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css?v=2">
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <script src="./msal.js"></script>
</head>
<body class="theme-grey">

  <!-- Écran de connexion -->
  <div id="auth-screen" style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:1.5rem;">
    <img src="logo.svg" alt="Muni-Consul" style="height:64px;width:auto;object-fit:contain;">
    <p style="color:var(--text-muted);font-size:.95rem;">Tableau de bord stratégique</p>
    <button id="btn-login" onclick="signIn()" style="padding:.75rem 2rem;background:#2563eb;color:#fff;border:none;border-radius:8px;font-size:1rem;font-family:inherit;cursor:pointer;font-weight:500;">
      Se connecter avec Microsoft
    </button>
    <div id="auth-error" style="color:#ef4444;font-size:.875rem;display:none;"></div>
  </div>

  <!-- Écran de chargement -->
  <div id="loading-screen" style="display:none;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:1rem;">
    <div class="spinner"></div>
    <div class="loading-bar"><div class="loading-fill" id="loading-fill"></div></div>
    <p id="loading-step" style="color:var(--text-muted);font-size:.875rem;">Initialisation…</p>
  </div>

  <!-- Application principale -->
  <div id="app" class="app" style="display:none;">

    <nav class="sidebar">
      <div class="sidebar-logo" style="display:flex;align-items:center;gap:10px;">
        <img src="logo.svg" alt="Muni-Consul" style="height:36px;width:auto;object-fit:contain;">
        <div style="display:flex;flex-direction:column;gap:1px;">
          <span style="font-size:1rem;font-weight:700;color:#C9A84C;letter-spacing:0.02em;white-space:nowrap;line-height:1.2;">Muni-Consul</span>
          <span style="font-size:0.65rem;color:var(--c-text-3);white-space:nowrap;letter-spacing:0.03em;line-height:1.2;">Solution municipale intelligente</span>
        </div>
      </div>
      <div style="padding:0 .75rem;margin-bottom:.25rem;font-size:.7rem;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.08em;">Navigation</div>
      <button class="nav-item active" onclick="switchPane('apercu',this)">📊 Aperçu</button>
      <button class="nav-item" id="nav-actions" onclick="switchPane('actions',this)">✅ Objectifs <span id="nav-alert-badge" class="nav-badge" style="display:none;"></span></button>
      <button class="nav-item" onclick="switchPane('axes',this)">🎯 Axes</button>
      <button class="nav-item" onclick="switchPane('timeline',this)">🗓 Jalons</button>
      <div style="padding:0 .75rem;margin:.75rem 0 .25rem;font-size:.7rem;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.08em;">Données</div>
      <button class="nav-item" onclick="switchPane('mavue',this)">👤 Ma vue</button>
      <button class="nav-item" onclick="switchPane('gantt',this)">📅 Gantt</button>
      <button class="nav-item" onclick="refreshData()">🔄 Actualiser</button>
      <div class="sidebar-footer">
        <div id="sp-status" class="sp-status"><span class="sp-dot"></span><span id="sp-label">Non connecté</span></div>
        <div style="display:flex;align-items:center;gap:.5rem;padding:.5rem .75rem;">
          <div style="width:32px;height:32px;border-radius:50%;background:#2563eb;display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:600;color:#fff;" id="user-initials">?</div>
          <span id="user-name" style="font-size:.8rem;color:var(--text-muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:120px;flex:1;"></span>
        </div>
        <div style="padding:.25rem .75rem .5rem;">
          <button onclick="signOut()" title="Se déconnecter" style="width:100%;display:flex;align-items:center;gap:6px;padding:5px 8px;border:1px solid rgba(255,255,255,0.1);border-radius:6px;background:none;color:var(--c-text-3);font-family:var(--font);font-size:.75rem;cursor:pointer;transition:background .15s;" onmouseover="this.style.background='rgba(255,255,255,0.06)'" onmouseout="this.style.background='none'">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            Déconnexion
          </button>
        </div>
        <div style="padding:.5rem .75rem;font-size:.7rem;color:var(--text-muted);border-top:1px solid var(--border);">
          © <span id="footer-year"></span> Muni-Consul
        </div>
      </div>
    </nav>

    <div class="main">
      <div class="topbar">
        <div>
          <div style="font-size:1.1rem;font-weight:600;" id="topbar-title">Aperçu</div>
          <div style="font-size:.8rem;color:var(--text-muted);" id="topbar-meta"></div>
        </div>
        <div style="display:flex;gap:.5rem;flex-wrap:wrap;">
          <button onclick="openFormModal(null)" style="padding:.5rem 1rem;background:#2563eb;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:.85rem;font-family:inherit;">+ Nouvel objectif</button>
          <button onclick="exportCSV()" style="padding:.5rem 1rem;background:var(--card);border:1px solid var(--border);border-radius:6px;cursor:pointer;font-size:.85rem;font-family:inherit;color:var(--text);">Exporter CSV</button>
          <button onclick="exportPDF()" style="padding:.5rem 1rem;background:var(--card);border:1px solid var(--border);border-radius:6px;cursor:pointer;font-size:.85rem;font-family:inherit;color:var(--text);">Exporter PDF</button>
          <button onclick="exportDashboardPDF()" title="Tableau de bord en une page pour les séances du conseil" style="padding:.5rem 1rem;background:var(--card);border:1px solid var(--border);border-radius:6px;cursor:pointer;font-size:.85rem;font-family:inherit;color:var(--text);display:flex;align-items:center;gap:6px;">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
            Tableau conseil
          </button>
          <button id="btn-presentation" onclick="togglePresentationMode()" style="padding:.5rem 1rem;background:var(--card);border:1px solid var(--border);border-radius:6px;cursor:pointer;font-size:.85rem;font-family:inherit;color:var(--text);">Présentation</button>
          <button onclick="openSettingsModal()" style="padding:.5rem 1rem;background:var(--card);border:1px solid var(--border);border-radius:6px;cursor:pointer;font-size:.85rem;font-family:inherit;color:var(--text);">⚙️ Paramètres</button>
          <button onclick="openSharePoint()" style="padding:.5rem 1rem;background:var(--card);border:1px solid var(--border);border-radius:6px;cursor:pointer;font-size:.85rem;font-family:inherit;color:var(--text);">Ouvrir SharePoint</button>
        </div>
      </div>

      <div id="alert-banner" class="alert-banner">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        <span id="alert-banner-text" class="alert-banner-text"></span>
        <button class="alert-banner-close" onclick="document.getElementById('alert-banner').classList.remove('show')" title="Fermer">×</button>
      </div>

      <div class="content">
        <div class="pane active" id="pane-apercu">
          <div id="kpi-grid" class="kpi-grid"></div>
          <div id="axes-bars" class="axes-bars"></div>
          <div class="charts-row">
            <div class="chart-card">
              <div class="chart-box-lg">
                <canvas id="chart-donut"></canvas>
              </div>
              <div id="donut-leg" class="donut-legend"></div>
            </div>
            <div class="chart-card">
              <div class="chart-box-lg">
                <canvas id="chart-line"></canvas>
              </div>
            </div>
          </div>
        </div>
        <div class="pane" id="pane-actions">
          <div class="actions-toolbar">
            <div class="search-wrap">
              <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
              <input id="actions-search" class="search-input" type="text" placeholder="Rechercher par titre, responsable, axe…"
                oninput="renderActions(undefined, 1)">
              <button id="search-clear" class="search-clear" onclick="clearSearch()" style="display:none;" title="Effacer">×</button>
            </div>
            <div id="filter-bar" class="filter-bar"></div>
          </div>
          <div style="overflow-x:auto;">
            <table class="actions-table">
              <thead>
                <tr>
                  <th class="th-sort" onclick="sortActions('titre')">   Titre       <span class="sort-icon" id="sort-titre"></span></th>
                  <th class="th-sort" onclick="sortActions('axe')">     Axe         <span class="sort-icon" id="sort-axe"></span></th>
                  <th class="th-sort" onclick="sortActions('resp')">    Responsable <span class="sort-icon" id="sort-resp"></span></th>
                  <th class="th-sort" onclick="sortActions('prio')">    Priorité    <span class="sort-icon" id="sort-prio"></span></th>
                  <th class="th-sort" onclick="sortActions('echeance')">Échéance    <span class="sort-icon" id="sort-echeance"></span></th>
                  <th class="th-sort" onclick="sortActions('pct')">     Avancement  <span class="sort-icon" id="sort-pct"></span></th>
                  <th class="th-sort" onclick="sortActions('statut')">  Statut      <span class="sort-icon" id="sort-statut"></span></th>
                  <th></th>
                </tr>
              </thead>
              <tbody id="actions-tbody"></tbody>
            </table>
          </div>
          <div id="actions-pagination"></div>
        </div>
        <div class="pane" id="pane-axes">
          <div id="axes-cards" class="axes-cards"></div>
        </div>
        <div class="pane" id="pane-mavue">
          <div class="mavue-header">
            <select id="mavue-resp-select" class="form-select" onchange="renderMaVue()">
              <option value="">— Sélectionnez un responsable —</option>
            </select>
          </div>
          <div id="mavue-kpis" class="kpi-grid"></div>
          <table class="actions-table">
            <tbody id="mavue-tbody"></tbody>
          </table>
        </div>
        <div class="pane" id="pane-gantt">
          <div class="gantt-header">
            <span id="gantt-year-label" class="gantt-year-label"></span>
          </div>
          <div id="gantt-container" class="gantt-container"></div>
        </div>
        <div class="pane" id="pane-timeline">
          <div id="timeline-list" class="timeline-list"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Modale paramètres -->
  <div id="settings-modal-bg" class="modal-bg" onclick="if(event.target===this)closeSettingsModal()">
    <div class="settings-modal">
      <div class="modal-header">
        <span style="font-weight:600;">⚙️ Paramètres</span>
        <button onclick="closeSettingsModal()" style="background:none;border:none;font-size:1.25rem;cursor:pointer;color:var(--text-muted);">×</button>
      </div>
      <div style="display:flex;border-bottom:1px solid var(--border);padding:0 1rem;">
        <button class="settings-tab active" onclick="switchSettingsTab('axes',this)">Axes</button>
        <button class="settings-tab" onclick="switchSettingsTab('resps',this)">Responsables</button>
        <button class="settings-tab" onclick="switchSettingsTab('statuts',this)">Statuts</button>
        <button class="settings-tab" onclick="switchSettingsTab('prios',this)">Priorités</button>
        <button class="settings-tab" onclick="switchSettingsTab('apparence',this)">Apparence</button>
      </div>
      <div class="modal-body">
        <div class="settings-pane active" id="settings-pane-axes">
          <label style="display:flex;align-items:center;gap:.5rem;margin-bottom:1rem;cursor:pointer;">
            <input type="checkbox" id="auto-calc-axes"> Calculer automatiquement l'avancement des axes
          </label>
          <div id="settings-axes-list"></div>
          <div class="add-item-form" style="margin-top:.75rem;background:var(--c-surface-2);border-radius:8px;padding:10px 12px;gap:8px;flex-wrap:wrap;align-items:flex-end;">
            <div class="add-item-field" style="flex:0 0 60px;">
              <label>Code</label>
              <input type="text" id="new-axe-id" maxlength="5" placeholder="A1" style="width:60px;" />
            </div>
            <div class="add-item-field" style="flex:1;min-width:160px;">
              <label>Nom de l'axe</label>
              <input type="text" id="new-axe-nom" placeholder="Ex : Gouvernance" />
            </div>
            <div class="add-item-field">
              <label>Couleur</label>
              <input type="color" id="new-axe-couleur" value="#534AB7" style="width:50px;height:32px;padding:2px;cursor:pointer;" />
            </div>
            <div class="add-item-field" style="flex:100%;width:100%;">
              <label>Description</label>
              <textarea id="new-axe-desc" rows="2" placeholder="Décrivez l'orientation stratégique de cet axe…" style="width:100%;resize:vertical;font-family:inherit;font-size:12px;padding:6px 8px;border:1px solid var(--c-border-med);border-radius:6px;background:var(--c-surface);color:var(--c-text);"></textarea>
            </div>
            <button onclick="addAxe()" style="height:32px;padding:0 1rem;background:#2563eb;color:#fff;border:none;border-radius:6px;cursor:pointer;font-family:inherit;align-self:flex-end;">+ Ajouter</button>
          </div>
        </div>
        <div class="settings-pane" id="settings-pane-resps">
          <div id="settings-resps-list"></div>
          <button onclick="addResponsable()" style="margin-top:.75rem;padding:.5rem 1rem;background:#2563eb;color:#fff;border:none;border-radius:6px;cursor:pointer;font-family:inherit;">+ Ajouter un responsable</button>
        </div>
        <div class="settings-pane" id="settings-pane-statuts">
          <div id="settings-statuts-list"></div>
        </div>
        <div class="settings-pane" id="settings-pane-prios">
          <div id="settings-prios-list"></div>
        </div>
        <div class="settings-pane" id="settings-pane-apparence">
          <div id="settings-theme-btns" style="display:flex;gap:.5rem;margin-top:.5rem;">
            <button onclick="setTheme('grey')" class="theme-btn" data-theme="grey">Gris foncé</button>
            <button onclick="setTheme('white')" class="theme-btn" data-theme="white">Blanc</button>
            <button onclick="setTheme('dark')" class="theme-btn" data-theme="dark">Sombre</button>
          </div>
        </div>
      </div>
      <div style="padding:1rem;border-top:1px solid var(--border);display:flex;justify-content:space-between;">
        <button onclick="resetSettings()" style="padding:.5rem 1rem;background:none;border:1px solid #ef4444;color:#ef4444;border-radius:6px;cursor:pointer;font-family:inherit;">Réinitialiser</button>
        <button onclick="saveSettings(true)" style="padding:.5rem 1rem;background:#2563eb;color:#fff;border:none;border-radius:6px;cursor:pointer;font-family:inherit;">Enregistrer</button>
      </div>
    </div>
  </div>

  <!-- Modale formulaire -->
  <div id="form-modal-bg" class="modal-bg" onclick="if(event.target===this)closeFormModal()">
    <div class="form-modal">
      <div class="form-title">
        <span id="form-modal-title">Nouvel objectif</span>
        <button class="form-close" onclick="closeFormModal()">×</button>
      </div>
      <!-- Onglets Détails / Historique -->
      <div id="form-tabs" style="display:flex;gap:0;border-bottom:1px solid var(--c-border);margin-bottom:1rem;">
        <button class="form-tab active" onclick="switchFormTab('details',this)" style="padding:6px 16px;border:none;background:none;cursor:pointer;font-family:var(--font);font-size:13px;color:var(--c-purple);border-bottom:2px solid var(--c-purple);font-weight:500;">Détails</button>
        <button class="form-tab" id="tab-historique-btn" onclick="switchFormTab('historique',this)" style="padding:6px 16px;border:none;background:none;cursor:pointer;font-family:var(--font);font-size:13px;color:var(--c-text-2);border-bottom:2px solid transparent;">Historique</button>
      </div>
      <!-- Panneau Détails -->
      <div id="form-pane-details">
      <div id="form-error"   class="form-error"></div>
      <div id="form-success" class="form-success"></div>
      <div id="form-saving"  class="form-saving">
        <div class="form-spinner"></div> Enregistrement…
      </div>
      <div class="form-grid">
        <div class="form-group full">
          <label class="form-label">Titre *</label>
          <input id="f-titre" class="form-input" type="text" placeholder="Titre de l'objectif">
        </div>
        <div class="form-group">
          <label class="form-label">Axe stratégique *</label>
          <select id="f-axe" class="form-select"></select>
        </div>
        <div class="form-group">
          <label class="form-label">Responsable</label>
          <select id="f-responsable" class="form-select"></select>
        </div>
        <div class="form-group">
          <label class="form-label">Priorité</label>
          <select id="f-priorite" class="form-select"></select>
        </div>
        <div class="form-group">
          <label class="form-label">Statut</label>
          <select id="f-statut" class="form-select"></select>
        </div>
        <div class="form-group">
          <label class="form-label">Date début</label>
          <input id="f-date-debut" class="form-input" type="date">
        </div>
        <div class="form-group">
          <label class="form-label">Date échéance *</label>
          <input id="f-echeance" class="form-input" type="date" onchange="autoAdjustStatut()">
        </div>
        <div class="form-group full">
          <label class="form-label">Avancement</label>
          <div class="form-range-wrap">
            <input id="f-avancement" type="range" min="0" max="100" value="0"
              style="flex:1;accent-color:var(--c-purple);"
              oninput="document.getElementById('f-avancement-val').textContent=this.value+'%'">
            <span id="f-avancement-val" class="form-range-val">0%</span>
          </div>
        </div>
        <div class="form-group full">
          <label class="form-label">Réalisation / Notes</label>
          <textarea id="f-description" class="form-textarea" rows="3" placeholder="Description, notes de suivi…"></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">Budget prévu ($)</label>
          <input id="f-budget" class="form-input" type="number" min="0" step="100" placeholder="0">
        </div>
        <div class="form-group">
          <label class="form-label">Commentaire de suivi</label>
          <input id="f-commentaire" class="form-input" type="text" placeholder="Commentaire…">
        </div>
      </div>
      </div><!-- fin form-pane-details -->

      <!-- Panneau Historique -->
      <div id="form-pane-historique" style="display:none;min-height:200px;max-height:420px;overflow-y:auto;">
        <div id="historique-liste" style="padding:.25rem 0;"></div>
      </div>

      <div class="form-actions">
        <button id="form-btn-delete" class="btn form-btn-delete" onclick="deleteAction()" style="display:none;">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
          Supprimer
        </button>
        <button class="btn form-btn-cancel" onclick="closeFormModal()">Annuler</button>
        <button class="btn form-btn-save btn-add" onclick="saveAction()">Enregistrer</button>
      </div>
    </div>
  </div>

  <!-- Modale détail -->
  <div id="modal-bg" class="modal-bg" onclick="if(event.target===this)closeModal()">
    <div class="modal-box" id="modal-box"></div>
  </div>

  <script src="js/utils.js?v=2"></script>
  <script src="js/sharepoint.js"></script>
  <script src="js/data.js?v=2"></script>
  <script src="js/state.js"></script>
  <script src="js/alerts.js"></script>
  <script src="js/render.js?v=2"></script>
  <script src="js/modal.js?v=2"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
  <script src="js/export.js?v=4"></script>
  <script src="js/settings.js"></script>
  <script src="js/navigation.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(r => console.info('Service Worker enregistré', r.scope))
          .catch(e => console.warn('Service Worker non enregistré', e));
      });
    }
  </script>

</body>
</html>
